name: GitHub Stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Neusa1990
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo
